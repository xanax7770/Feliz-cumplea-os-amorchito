<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* UNIVERSO */
#universe {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #0a0a1a, #000000);
}

/* 🌙 LUNA REALISTA */
.moon {
  position: absolute;
  top: 8%;
  right: 8%;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, #ffffff, #e8e8e8 40%, #bdbdbd 70%, #9e9e9e);
  box-shadow:
    0 0 60px rgba(255,255,255,0.9),
    0 0 120px rgba(255,200,255,0.25);
  overflow: hidden;
}

.moon::after {
  content: "";
  position: absolute;
  top: 0;
  left: 60px;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,0,0,0.95), black 70%);
}

.moon::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(
    circle at 30% 30%,
    rgba(255,255,255,0.7),
    rgba(255,255,255,0.2),
    transparent 60%
  );
  filter: blur(2px);
}

/* ✨ ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.3;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

/* 🌠 FUGACES */
.shooting-star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  animation: shoot 1s linear forwards;
  z-index: 5;
}

@keyframes shoot {
  from { transform: translate(0,0); opacity: 1; }
  to { transform: translate(500px,300px); opacity: 0; }
}

/* 💖 MENSAJE */
.mensaje {
  position: absolute;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 75%;
  text-align: center;
  color: pink;
  font-size: 13px;
  line-height: 1.5;
  text-shadow: 0 0 8px pink;
  background: rgba(0,0,0,0.25);
  padding: 12px;
  border-radius: 15px;
  backdrop-filter: blur(4px);
  z-index: 10;
  white-space: pre-line;
}

/* 💓 CORAZÓN */
.heart {
  position: absolute;
  top: 78%;
  left: 50%;
  width: 90px;
  height: 90px;
  background: #ff4d6d;
  transform: translateX(-50%) rotate(-45deg);
  box-shadow: 0 0 25px #ff4d6d;
  z-index: 9;
  animation: beat 1.2s infinite;
  cursor: pointer;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 90px;
  height: 90px;
  background: #ff4d6d;
  border-radius: 50%;
}

.heart::before { top: -45px; left: 0; }
.heart::after { left: 45px; top: 0; }

/* 💓 LATIDO */
@keyframes beat {
  0%, 100% { transform: translateX(-50%) rotate(-45deg) scale(1); }
  50% { transform: translateX(-50%) rotate(-45deg) scale(1.15); }
}

/* 💥 POP */
.heart.pop {
  animation: pop 0.6s ease-out;
}

@keyframes pop {
  0% { transform: translateX(-50%) rotate(-45deg) scale(1); }
  50% { transform: translateX(-50%) rotate(-45deg) scale(1.6); filter: brightness(2); }
  100% { transform: translateX(-50%) rotate(-45deg) scale(1); }
}

/* 💖 partículas */
.particle {
  position: absolute;
  font-size: 18px;
  animation: floatUp 1.5s ease-out forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-120px); opacity: 0; }
}
</style>
</head>

<body>

<div id="universe">
  <div class="moon"></div>

  <div class="mensaje">
Feliz cumpleaños, mi bebe emosha❤️

Hoy celebro el día en que llegó al mundo la persona que más feli me ache. Desde que estás conmigo, todo tiene más sentido.

Te amo muchísimo 💖
  </div>

  <div class="heart"></div>
</div>

<script>
const u = document.getElementById("universe");

/* 🌟 ESTRELLAS */
for (let i = 0; i < 200; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random() * window.innerHeight + "px";
  s.style.left = Math.random() * window.innerWidth + "px";
  u.appendChild(s);
}

/* 🌠 FUGACES */
function crearFugaz() {
  let s = document.createElement("div");
  s.className = "shooting-star";
  s.style.top = Math.random() * 50 + "%";
  s.style.left = Math.random() * 100 + "%";
  u.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}
setInterval(crearFugaz, 2000);

/* 💓 CORAZÓN INTERACTIVO */
const heart = document.querySelector(".heart");

heart.addEventListener("click", () => {
  heart.classList.add("pop");
  crearCorazones();

  setTimeout(() => {
    heart.classList.remove("pop");
  }, 600);
});

/* 💖 partículas */
function crearCorazones() {
  for (let i = 0; i < 10; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.innerHTML = "💖";
    p.style.left = (50 + (Math.random() * 20 - 10)) + "%";
    p.style.top = "75%";

    u.appendChild(p);

    setTimeout(() => p.remove(), 1500);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* LOGIN /
#login {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  color: white;
  z-index: 10;
}

/ UNIVERSO /
#universe {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
}

/ 🌙 LUNA /
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff, #aaa, #555);
  box-shadow: 0 0 40px white, 0 0 80px #ff99ff;
  z-index: 3;
}

/ ⭐ ESTRELLAS (AHORA SÍ VISIBLES) /
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  z-index: 1;
}

/ 🌠 FUGACES /
.shooting-star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  animation: shoot 1s linear forwards;
}

@keyframes shoot {
  from { transform: translate(0,0); opacity: 1; }
  to { transform: translate(400px,400px); opacity: 0; }
}

/ 💫 MENSAJES /
.float-msg {
  position: absolute;
  color: pink;
  font-size: 14px;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-200px); opacity: 0; }
}

/ 💌 TEXTO /
.mensaje {
  position: absolute;
  top: 60%;
  width: 100%;
  text-align: center;
  color: pink;
  z-index: 5;
}
</style>
</head>

<body>

<div id="login">
  <h2>🔐 Acceso</h2>
  <input type="password" id="password">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="universe">
  <div class="moon"></div>

  <div class="mensaje">
    Feliz cumpleaños, mi bebe emosha❤️
  </div>
</div>

<script>
function entrar() {
  if (document.getElementById("password").value === "amor") {
    document.getElementById("login").style.display = "none";
    document.getElementById("universe").style.display = "block";

    crearEstrellas();
    setInterval(crearFugaz, 2000);
    setInterval(crearMensaje, 1500);
  } else {
    alert("Clave incorrecta");
  }
}

/ ⭐ ESTRELLAS (FIX REAL) /
function crearEstrellas() {
  const universe = document.getElementById("universe");

  for (let i = 0; i < 300; i++) {
    let star = document.createElement("div");
    star.className = "star";

    // USAMOS % en lugar de px (clave del fix)
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";

    universe.appendChild(star);
  }
}

/ 🌠 /
function crearFugaz() {
  const u = document.getElementById("universe");

  let s = document.createElement("div");
  s.className = "shooting-star";

  s.style.top = Math.random() * 50 + "%";
  s.style.left = Math.random() * 100 + "%";

  u.appendChild(s);

  setTimeout(() => s.remove(), 1000);
}

/ 💫 */
const msgs = ["Te amo 💖","Mi universo 🌌","Mi todo ✨"];

function crearMensaje() {
  const u = document.getElementById("universe");

  let m = document.createElement("div");
  m.className = "float-msg";
  m.innerText = msgs[Math.floor(Math.random() * msgs.length)];

  m.style.left = Math.random() * 100 + "%";
  m.style.top = "90%";

  u.appendChild(m);

  setTimeout(() => m.remove(), 6000);
}
</script>

</body>
</html>

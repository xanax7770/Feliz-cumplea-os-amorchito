<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* LOGIN */
#login {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff0066;
  color: white;
}

/* UNIVERSO */
#universe {
  display: none;
}

/* LUNA */
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 30px white;
}

/* MENSAJE */
.mensaje {
  position: absolute;
  top: 60%;
  width: 100%;
  text-align: center;
  color: pink;
  padding: 0 20px;
}
</style>
</head>

<body>

<div id="login">
  <h2>🔐 Acceso</h2>
  <input type="password" id="password" placeholder="Clave">
  <br><br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="universe">
  <div class="moon"></div>

  <div class="mensaje">
Feliz cumpleaños, mi bebe emosha❤️<br><br>

Hoy celebro el día en que llegó al mundo la persona que más feli me ache. Desde que estás conmigo, toyo tiene másh sentido, toyo che siente másh monito.<br><br>

Tiamuuu muchísimo💖
  </div>
</div>

<script>
function entrar() {
  var pass = document.getElementById("password").value;

  if(pass === "amor") {
    document.getElementById("login").style.display = "none";
    document.getElementById("universe").style.display = "block";
  } else {
    alert("Clave incorrecta");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* UNIVERSO */
#universe {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #0a0a1a, #000);
}

/* 🌙 LUNA */
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #ddd, #aaa);
  box-shadow: 0 0 80px white;
}

/* 💖 MENSAJE (FORZADO VISIBILIDAD) */
.mensaje {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  color: pink;
  font-size: 14px;
  text-align: center;
  line-height: 1.5;
  text-shadow: 0 0 10px pink;
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 15px;
  z-index: 999;
  white-space: pre-line;
}

/* ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
}
</style>
</head>

<body>

<div id="universe">
  <div class="moon"></div>

  <div class="mensaje">
Feliz cumpleaños, mi bebe emosha❤️

Hoy celebro el día en que llegó al mundo la persona que más feli me ache. Desde que estás conmigo, todo tiene más sentido.

Te amo muchísimo 💖
  </div>
</div>

<script>
const u = document.getElementById("universe");

/* ESTRELLAS SIMPLES (SIN FALLA) */
for (let i = 0; i < 200; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random() * window.innerHeight + "px";
  s.style.left = Math.random() * window.innerWidth + "px";
  u.appendChild(s);
}
</script>

</body>
</html>

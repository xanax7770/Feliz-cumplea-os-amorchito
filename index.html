<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Especial</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* LOGIN */
#login {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  text-align: center;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff0066;
  color: white;
}

/* UNIVERSO */
#universe {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
}

/* LUNA */
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff, #aaa, #555);
  box-shadow: 0 0 40px #fff;
}

/* ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
}

/* MENSAJE */
.mensaje {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  color: pink;
  text-align: center;
}
</style>
</head>

<body>

<div id="login">
  <h2>🔐 Acceso</h2>
  <input type="password" id="password">
  <button onclick="check()">Entrar</button>
</div>

<div id="universe">
  <div class="moon"></div>
  <div class="mensaje" id="texto"></div>
</div>

<script>
const PASSWORD = "amor";

const mensaje = "Feliz cumpleaños ❤️";

function check() {
  let pass = document.getElementById("password").value;

  if(pass === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("universe").style.display = "block";

    document.getElementById("texto").innerText = mensaje;

    crearEstrellas();
  } else {
    alert("Clave incorrecta");
  }
}

function crearEstrellas() {
  const universe = document.getElementById("universe");

  for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    universe.appendChild(star);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
}

/* 🔐 PANTALLA DE BLOQUEO */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #2a0a3d, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: white;
  text-align: center;
}

#lockScreen input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  text-align: center;
}

#lockScreen button {
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: 1px solid white;
  background: transparent;
  color: white;
}

/* 💥 EXPLOSIÓN */
.starburst {
  position: fixed;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  z-index: 10000;
  pointer-events: none;
  animation: burst 1s ease-out forwards;
}

@keyframes burst {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
}

/* 🌌 UNIVERSO */
#universe {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,150,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.12), transparent 45%),
    radial-gradient(circle at top, #2a0a3d, #000 70%);
  animation: drift 20s infinite alternate;
  z-index: 1;
  display: none;
}

@keyframes drift {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(20deg); }
}

/* ⭐ ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 6px white;
  animation: twinkle 4s infinite ease-in-out;
  z-index: 0;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(2); }
}

/* ☄️ METEORITOS */
.meteor, .shooting-star {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 20px white;
  z-index: 2;
}

.shooting-star {
  width: 3px;
  height: 3px;
  animation: shoot 1s linear forwards;
}

@keyframes shoot {
  from { transform: translate(0,0); opacity: 1; }
  to { transform: translate(500px, 250px); opacity: 0; }
}

/* 🌙 LUNA */
.moon {
  position: absolute;
  top: 6%;
  right: 8%;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%,
    #ffffff 0%,
    #f2f2f2 30%,
    #cfcfcf 60%,
    #8c8c8c 100%);
  box-shadow:
    0 0 60px rgba(255,255,255,0.8),
    0 0 120px rgba(255,255,255,0.3);
  animation: pulse 4s infinite ease-in-out;
  z-index: 5;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* 💖 TEXTOS */
.card {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  background: rgba(0,0,0,0.35);
  border-radius: 18px;
  padding: 10px;
  color: #ffb6c1;
  text-align: center;
  font-size: 10px;
  line-height: 1.3;
  z-index: 6;
  text-shadow: 0 0 10px rgba(255,182,193,0.6);
}

.card2 {
  position: absolute;
  top: 58%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: rgba(0,0,0,0.25);
  border-radius: 16px;
  padding: 8px;
  color: #ff9db2;
  text-align: center;
  font-size: 9px;
  line-height: 1.3;
  z-index: 6;
  text-shadow: 0 0 8px rgba(255,157,178,0.5);
}

/* 💓 LATIDO */
.heartbeat {
  display: inline-block;
  animation: heartbeat 1.4s infinite;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.08); }
  50% { transform: scale(0.98); }
  75% { transform: scale(1.12); }
  100% { transform: scale(1); }
}

/* 🎵 BOTÓN */
#musicBtn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 10;
  background: rgba(255,255,255,0.15);
  border: 1px solid white;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🔐 BLOQUEO -->
<div id="lockScreen">
  <h2>🔐 Acceso especial</h2>
  <p>¿Que Es Lo Que Mas Te Gusta?</p>
  <input type="password" id="pass" placeholder="Respuesta">
  <button onclick="checkPass()">Entrar</button>
</div>

<!-- 🌌 UNIVERSO -->
<div id="universe">

  <div class="moon"></div>

  <div class="card">
    <span class="heartbeat">Feliz cumpleaños, mi bebé hermosa ❤️</span><br><br>

    Hoy es un día muy especial porque naciste tú, la persona que cambió mi vida por completo.<br><br>

    Te amo muchísimo 💖
  </div>

  <div class="card2">
    ODAAAAAA 🐮<br><br>
    Siempre contigo 💖
  </div>

  <button id="musicBtn">🎵 Activar música</button>

</div>

<script>
const u = document.getElementById("universe");

/* 💥 EXPLOSIÓN */
function createBurst() {
  for (let i = 0; i < 50; i++) {
    const star = document.createElement("div");
    star.className = "starburst";

    const x = (Math.random() - 0.5) * 500 + "px";
    const y = (Math.random() - 0.5) * 500 + "px";

    star.style.setProperty("--x", x);
    star.style.setProperty("--y", y);

    star.style.left = "50%";
    star.style.top = "50%";

    document.body.appendChild(star);

    setTimeout(() => star.remove(), 1000);
  }
}

/* 🔐 CONTRASEÑA */
function checkPass() {
  const value = document.getElementById("pass").value.toLowerCase().trim();

  if (value === "chocolate") {

    createBurst();

    setTimeout(() => {
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("universe").style.display = "block";
    }, 700);

  } else {
    alert("❌ Incorrecto 💖");
  }
}

/* ⭐ ESTRELLAS */
for (let i = 0; i < 300; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random() * window.innerHeight + "px";
  s.style.left = Math.random() * window.innerWidth + "px";
  u.appendChild(s);
}

/* ☄️ EFECTOS */
function meteor() {
  let m = document.createElement("div");
  m.className = "meteor";
  m.style.top = Math.random() * 30 + "%";
  m.style.left = Math.random() * 40 + "%";
  u.appendChild(m);
  setTimeout(() => m.remove(), 1800);
}

function shootingStar() {
  let s = document.createElement("div");
  s.className = "shooting-star";
  s.style.top = Math.random() * 50 + "%";
  s.style.left = Math.random() * 100 + "%";
  u.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}

setInterval(meteor, 2000);
setInterval(shootingStar, 1200);

/* 🎵 MÚSICA */
let audioCtx;
let playing = false;

function startMusic() {
  if (playing) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  playing = true;

  const notes = [
    261.63, 261.63, 293.66, 261.63,
    349.23, 329.63, 261.63
  ];

  let i = 0;

  setInterval(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = notes[i % notes.length];

    gain.gain.value = 0.07;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);

    i++;
  }, 450);

  document.getElementById("musicBtn").style.display = "none";
}

document.getElementById("musicBtn").addEventListener("click", startMusic);
document.body.addEventListener("touchstart", startMusic, { once: true });

</script>

</body>
</html>

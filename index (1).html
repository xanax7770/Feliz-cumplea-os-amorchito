
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Especial</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
  text-align: center;
}

/* LOGIN */
#login {
  position: absolute;
  width: 100%;
  top: 40%;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  text-align: center;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff0066;
  color: white;
}

/* UNIVERSO */
#universe {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
}

/* LUNA */
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff, #aaa, #555);
  box-shadow: 0 0 50px #fff, 0 0 100px #ffccff;
  animation: moon 3s infinite alternate;
}

@keyframes moon {
  from { box-shadow: 0 0 40px #fff; }
  to { box-shadow: 0 0 80px #ff99ff; }
}

/* ESTRELLAS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* CORAZÓN */
.heart {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 110px;
  color: #ff4da6;
  text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff0066;
  animation: beat 1s infinite;
}

@keyframes beat {
  50% { transform: translate(-50%, -50%) scale(1.2); }
}

/* MENSAJE PRO */
.mensaje-pro {
  position: absolute;
  top: 58%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  height: 220px;
  overflow-y: auto;
  font-size: 18px;
  color: #ffb3c6;
  line-height: 1.6em;
  text-shadow: 0 0 10px #ff4da6;
  background: rgba(0,0,0,0.3);
  border-radius: 20px;
  padding: 15px;
  opacity: 0;
  animation: fadeIn 2s forwards;
  animation-delay: 1.5s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* SCROLL BONITO */
.mensaje-pro::-webkit-scrollbar {
  width: 5px;
}
.mensaje-pro::-webkit-scrollbar-thumb {
  background: #ff4da6;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="login">
  <h2>🔐 Acceso privado</h2>
  <input type="password" id="password" placeholder="Clave">
  <button onclick="check()">Entrar</button>
  <p id="error"></p>
</div>

<div id="universe">
  <div class="moon"></div>
  <div class="heart">❤️</div>

  <div class="mensaje-pro">
    <div id="texto"></div>
  </div>

  <audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>
</div>

<script>
const PASSWORD = "amor";

const mensaje = `Feliz cumpleaños, mi bebe emosha❤️

Hoy celebro el día en que llegó al mundo la persona que más feli me ache. Desde que estás conmigo, toyo tiene másh sentido, toyo che siente másh monito. Tu sonrisa es mi lugar favorito y tu forma de ser es algo que nunca dejaré de admirar.

Gachash por cada momento, por cada risa, por cada becho que me llena el alma. Eres lo mejor que me ha pasado y ño cambiaría naya de lo que tenemos.

Decheo que este nuevo año de vida te traiga toyo lo que sueñas, porque te lo mereces más que nadie. Y quelo que sepas que voy a estar a tu lado para celebrarlo todo contigo.

Tiamuuu muchísimo💖`;

let i = 0;

function check() {
  let pass = document.getElementById("password").value.toLowerCase();

  if(pass === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("universe").style.display = "block";
    crearEstrellas();
    escribirTexto();
    document.getElementById("music").play();
  } else {
    document.getElementById("error").innerText = "Clave incorrecta 💔";
  }
}

function crearEstrellas() {
  for (let i = 0; i < 300; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (1 + Math.random() * 2) + "s";
    document.body.appendChild(star);
  }
}

function escribirTexto() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML += mensaje[i] === "\n" ? "<br>" : mensaje[i];
    i++;
    setTimeout(escribirTexto, 35);
  }
}
</script>

</body>
</html>
